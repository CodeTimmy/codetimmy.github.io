<!DOCTYPE html>
<html lang="de">

<head>
<title>Timmy: Projects</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    z-index: 10;
    position: relative;
    background: rgba(255, 255, 255, 0.005);
    padding: 50px 40px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.007);
    width: 380px;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    overflow: hidden;
}

.card:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 68, 68, 0.4);
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    transform: translateY(-5px);
    backdrop-filter: blur(20px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h2 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    opacity: 0.8;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    color: #38bdf8;
    text-decoration: none;
}
</style>
</head>
<body>
<h1>🚀 Meine Projekte</h1>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <h2>Space Shooter</h2>
        <p>Ein cooles Arcade-Spiel mit Aliens 👽</p>
        <a href="#">Ansehen</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <h2>Server Tool</h2>
        <p>Java Tool zum Starten & Steuern von Servern</p>
        <a href="#">GitHub</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <h2>Audio Recorder</h2>
        <p>Browser Aufnahme mit Mikrofon 🎤</p>
        <a href="#">Testen</a>
    </div>

</div>
</body>
<script>
  
</script>
</html>
