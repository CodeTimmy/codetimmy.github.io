<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Projekte</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    transition: 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    background: #334155;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h2 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    opacity: 0.8;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    color: #38bdf8;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>🚀 Meine Projekte</h1>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <h2>Player.py</h2>
        <p>Ein minimalistischer funktionsreicher Audioplayer</p>
        <a href="/player">Mehr...</a>
    </div>

</div>

</body>
</html>
