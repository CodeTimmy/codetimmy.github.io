  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #262626;
      padding: 16px 20px;
      max-width: 700px;
      margin: 0px auto;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
    }

    .card:hover {
    box-shadow: 0 0 20px #9999aa;
    background: #2a2a2a;
    }

    .center {
      text-align: center;
      margin: 18px auto;
      font-size: 60px;
    }

  .buttons {
    justify-content: center;
    display: flex;
    flex-direction: row;
    gap: 30px;
    margin: 13px auto;
  }

  .buttons button {
    width: 150px;
    height: 48px;
    border: none;
    border-radius: 5%;
    background: #2f2f2f;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
/* Die Website wird und SOLL nicht ohne den Credit an den Ersteller laden. */
  }

  .buttons button:hover {
    box-shadow: 0 0 20px #9999aa;
    background: #353535;
  }

  body {
    font-family: "Inter", sans-serif;
  }

  h1, h2 {
    font-family: "Orbitron", sans-serif;
  }

  .imgcontainer {
    display: flex;
    justify-content: center; /* mittig */
    gap: 50px;               /* Abstand zwischen den Boxen */
    margin: 40px 0;
  }

  .imgbox {
    display: flex;
    flex-direction: column;
    background: #262626;
    align-items: center;
    border-radius: 10px;
    padding: 10px;
    width: 363px;
    transition: transform 0.2s ease;
  }

  .imgbox img {
    width: 353px;
    height: 399px;
    object-fit: cover;
    margin-bottom: 8px;
  }

  .imgbox-text {
    font-size: 35px;
    text-align: center;
  }

  .imgbox:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px #9999aa;
    background: #353535;
  }

  .mobile {
    display: none;
  }

/* Mobile: sichtbar */
@media (max-width: 1100px) {
  .imgcontainer {
    flex-direction: column;
  }
  .mobile {
    display: block;
  }
}

  </style>
