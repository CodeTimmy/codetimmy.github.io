    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Sterne im Hintergrund */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            top: -10px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        /* Die Profil-Card */
        .profile-card {
            z-index: 10;
            position: relative;
            background: rgba(255, 255, 255, 0.005);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.007);
            width: 380px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        /* Der Leuchteffekt hinter der Card beim Hover */
        .profile-card::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 68, 68, 0.2); /* Farbe leicht angepasst auf Timmy-Vibe */
            filter: blur(50px);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.6s ease;
            z-index: -1;
        }

        .profile-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 68, 68, 0.4);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
            backdrop-filter: blur(20px);
        }

        .profile-card:hover::before {
            width: 300px;
            height: 300px;
        }

        /* Avatar */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            transition: all 0.5s ease;
            object-fit: cover;
	    opacity: 0.2;
        }

        .profile-card:hover .avatar {
            border-color: #ff4444;
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.6);
            transform: scale(1.05) rotate(-3deg);
	    opacity: 1;
        }

        /* Name und Badges */
        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 4px;
            font-weight: 800;
            color: rgba(255,255,255,0.04);
            transition: 0.5s;
        }

        .profile-card:hover h1 {
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.5s;
        }

        .profile-card:hover .badges {
            opacity: 1;
            transform: translateY(0);
        }

        .badge {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff4444;
        }

	.badge2 {
	    background: rgba(25, 0, 0, 0.05);
	    border-radius: 5px;
	}

        /* Info Box */
        .info-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            opacity: 0;
            transition: 0.6s;
        }

        .profile-card:hover .info-box {
            opacity: 1;
        }

        .discord-link {
            display: block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(88, 101, 242, 0.6);
        }

        .projects-link {
            display: block;
            background: #F4680B;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(245, 121, 39, 0.3);
        }

        .projects-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(245, 121, 39, 0.6);
        }

        .footer-text {
            display: inline-block;
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .footer-text:hover {
            color: #fff;
        }
    </style>
