<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support Me</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: Arial, sans-serif;
        color: white;
    }

    .box {
        width: 420px;
        padding: 25px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    .address {
        background: rgba(255,255,255,0.15);
        padding: 10px;
        border-radius: 10px;
        margin: 10px 0;
        font-size: 13px;
        word-break: break-all;
        transition: 0.2s;
    }

    .address:hover {
        background: rgba(255,255,255,0.25);
    }

    .label {
        font-weight: bold;
        margin-top: 15px;
        display: block;
    }
</style>
</head>

<body>

<div class="box">
    <h2>💸 Support Me</h2>

    <span class="label">Solana (SOL)</span>
    <div class="address">3CMDrxgQiUoQPVxNvrXq9Gv1A7PRGgMuBZshhcbRuhf6</div>

    <span class="label">Bitcoin (BTC)</span>
    <div class="address">bc1q35z2zda4ef9w6n8ltfycvdhqh7w98727htx6nx</div>

    <span class="label">Ethereum (ETH)</span>
    <div class="address">0x45Edc3Aa33dF00c270e7c01e1A544939FAeF57F4</div>
</div>

</body>
</html>
